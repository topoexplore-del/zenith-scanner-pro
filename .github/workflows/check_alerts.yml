name: Check Alerts (Every 5 min)

on:
  schedule:
    - cron: '*/5 14-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alert-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Quick data refresh (no backtest)
        run: python scripts/build_data.py --out-dir data --skip-backtest
        env:
          TZ: America/New_York
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Check alerts
        run: python scripts/check_alerts.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: alert check [5min]" && git push)
