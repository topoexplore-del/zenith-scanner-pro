name: Full Refresh + Backtest (Daily)

on:
  schedule:
    # Mon-Fri at 21:30 UTC (4:30 PM ET — after market close)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Full data refresh + backtest
        run: python scripts/build_data.py --out-dir data
        env:
          TZ: America/New_York
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: daily refresh + backtest [automated]" && git push)
